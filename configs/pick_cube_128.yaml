# Pick Cube Task — PickCubeEnv with joint-space actions
# 128-env reference configuration
experiment:
  name: "pick_cube"
  base_dir: "runs"
  wandb_project: "pick-101"

training:
  timesteps: 1024000
  n_envs: 128
  eval_freq: 102400
  save_freq: 102400
  video_log_freq: 102400
  video_camera: "wide"
  seed: 42

sac:
  learning_rate: 3.0e-4
  buffer_size: 2000000
  learning_starts: 38400
  batch_size: 4096
  tau: 0.005
  gamma: 0.99
  train_freq: 1
  gradient_steps: 32

env:
  normalize_obs: true
  normalize_reward: false
  max_episode_steps: 400
  action_scale: 0.05
  reward_config:
    grasp_distance_threshold: 0.03
    gripper_closed_threshold: 0.3
    lift_height_threshold: 0.03
    success_threshold: 0.03
    reach_weight: 1.0
    grasp_bonus: 2.0
    lift_bonus: 4.0
    lift_height_scale: 15.0
    place_weight: 1.0
    success_bonus: 10.0
    drop_penalty: 5.0

eval:
  episodes: 10
